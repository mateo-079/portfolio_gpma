<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page introuvable · PMG</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080808; --accent: #c8ff00; --accent2: #ff6b35;
      --text: #f0f0f0; --muted: #555;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* Bruit */
    body::before {
      content: '';
      position: fixed; inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0;
    }

    .glitch {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(7rem, 20vw, 18rem);
      line-height: 0.85;
      color: var(--text);
      position: relative;
      letter-spacing: -0.02em;
      animation: glitch-main 4s steps(1) infinite;
    }

    .glitch::before,
    .glitch::after {
      content: '404';
      position: absolute;
      inset: 0;
      font-family: inherit;
      font-size: inherit;
    }

    .glitch::before {
      color: var(--accent);
      clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
      animation: glitch-top 4s steps(1) infinite;
    }

    .glitch::after {
      color: var(--accent2);
      clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%);
      animation: glitch-bot 4s steps(1) infinite;
    }

    @keyframes glitch-main {
      0%, 92%, 100% { transform: none; }
      94% { transform: translateX(-2px); }
      96% { transform: translateX(2px); }
      98% { transform: translateX(-1px); }
    }

    @keyframes glitch-top {
      0%, 92%, 100% { transform: none; opacity: 0; }
      94% { transform: translateX(4px); opacity: 1; }
      96% { transform: translateX(-4px); opacity: 1; }
      98% { opacity: 0; }
    }

    @keyframes glitch-bot {
      0%, 92%, 100% { transform: none; opacity: 0; }
      94% { transform: translateX(-3px); opacity: 1; }
      96% { transform: translateX(3px); opacity: 1; }
      98% { opacity: 0; }
    }

    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      padding: 6px 16px;
      border: 1px solid rgba(200,255,0,0.2);
      border-radius: 2px;
      background: rgba(200,255,0,0.03);
    }

    .msg {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 2.5rem;
      font-weight: 300;
      max-width: 380px;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #080808;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 30px;
      border-radius: 2px;
      transition: box-shadow 0.3s, transform 0.2s;
    }

    .btn-home:hover {
      box-shadow: 0 0 40px rgba(200,255,0,0.3);
      transform: translateY(-2px);
    }

    .btn-home svg { width: 14px; height: 14px; }

    .logo {
      position: fixed;
      top: 28px; left: 48px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    .logo span { color: var(--accent); }

    /* Glow radial */
    .glow {
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,255,0,0.045) 0%, transparent 65%);
      pointer-events: none;
      animation: glow-shift 8s ease-in-out infinite alternate;
    }

    @keyframes glow-shift {
      from { transform: translate(0,0); }
      to   { transform: translate(80px,50px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .glitch, .glitch::before, .glitch::after { animation: none; }
      .glitch::before, .glitch::after { opacity: 0; }
      .glow { animation: none; }
    }
  </style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>

  <a href="index.html" class="logo">PMG<span>.</span></a>

  <div class="wrap">
    <div class="glitch" aria-label="Erreur 404">404</div>
    <div class="tag">Page introuvable</div>
    <p class="msg">Cette page n'existe pas ou a été déplacée.<br />Retournons là où tout a du sens.</p>
    <a href="index.html" class="btn-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
      </svg>
      Retour au portfolio
    </a>
  </div>
</body>
</html>
